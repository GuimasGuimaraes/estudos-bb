<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia BB — Agente de Tecnologia</title>
<style>
  :root {
    color-scheme: light;
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --ink-1: #0b0b0b;
    --ink-2: #52514e;
    --ink-muted: #898781;
    --grid: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    --series-1: #2a78d6;
    --series-2: #008300;
    --series-3: #e87ba4;
    --seq-250: #86b6ef;
    --seq-400: #3987e5;
    --seq-450: #2a78d6;
    --seq-600: #184f95;
    --good: #0ca30c;
    --good-text: #006300;
    --warning: #fab219;
    --serious: #ec835a;
    --critical: #d03b3b;
    --accent: #2a78d6;
    --accent-wash: rgba(42,120,214,0.10);
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --ink-1: #ffffff;
      --ink-2: #c3c2b7;
      --ink-muted: #898781;
      --grid: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255,255,255,0.10);
      --series-1: #3987e5;
      --series-2: #008300;
      --series-3: #d55181;
      --good-text: #0ca30c;
      --accent: #3987e5;
      --accent-wash: rgba(57,135,229,0.15);
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --surface-1: #1a1a19;
    --page: #0d0d0d;
    --ink-1: #ffffff;
    --ink-2: #c3c2b7;
    --ink-muted: #898781;
    --grid: #2c2c2a;
    --baseline: #383835;
    --border: rgba(255,255,255,0.10);
    --series-1: #3987e5;
    --series-2: #008300;
    --series-3: #d55181;
    --good-text: #0ca30c;
    --accent: #3987e5;
    --accent-wash: rgba(57,135,229,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page);
    color: var(--ink-1);
    line-height: 1.55;
    font-size: 15px;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 16px 16px 80px; }

  header.top {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 14px 0 10px;
  }
  header.top h1 { font-size: 1.25rem; font-weight: 700; }
  header.top .sub { color: var(--ink-2); font-size: .85rem; }
  header.top .spacer { flex: 1; }
  .theme-btn {
    border: 1px solid var(--border); background: var(--surface-1); color: var(--ink-2);
    border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: .85rem;
  }

  nav.tabs {
    display: flex; gap: 4px; flex-wrap: wrap; position: sticky; top: 0; z-index: 20;
    background: var(--page); padding: 8px 0; border-bottom: 1px solid var(--grid);
  }
  nav.tabs button {
    border: none; background: transparent; color: var(--ink-2); font-size: .95rem;
    padding: 8px 14px; border-radius: 8px; cursor: pointer; font-family: inherit;
  }
  nav.tabs button:hover { background: var(--accent-wash); }
  nav.tabs button.active { background: var(--accent); color: #fff; font-weight: 600; }

  main section.tab { display: none; padding-top: 18px; }
  main section.tab.active { display: block; }

  .card {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; margin-bottom: 16px;
  }
  .card h2 { font-size: 1.05rem; margin-bottom: 10px; }
  .card h3 { font-size: .95rem; margin: 14px 0 6px; }
  .muted { color: var(--ink-muted); font-size: .85rem; }
  .small { font-size: .85rem; color: var(--ink-2); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 760px) {
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); }
  }

  /* stat tiles */
  .tile { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .tile .label { font-size: .78rem; color: var(--ink-2); }
  .tile .value { font-size: 1.7rem; font-weight: 700; line-height: 1.2; }
  .tile .delta { font-size: .78rem; color: var(--ink-muted); }
  .tile .delta.up { color: var(--good-text); }

  /* coach messages */
  .coach-msg {
    display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px;
    border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border);
    font-size: .92rem;
  }
  .coach-msg .ico { font-size: 1.05rem; line-height: 1.4; }
  .coach-msg.info { background: var(--accent-wash); }
  .coach-msg.good { background: rgba(12,163,12,0.10); }
  .coach-msg.warning { background: rgba(250,178,25,0.13); }
  .coach-msg.serious { background: rgba(208,59,59,0.10); }

  /* today blocks & reviews */
  .block-item, .review-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px;
  }
  .block-item.done { opacity: .55; }
  .block-item.done .bt { text-decoration: line-through; }
  .block-item input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
  .block-item .bt { flex: 1; }
  .badge {
    display: inline-block; font-size: .72rem; padding: 2px 8px; border-radius: 999px;
    background: var(--accent-wash); color: var(--accent); font-weight: 600; white-space: nowrap;
  }
  .badge.late { background: rgba(208,59,59,0.12); color: var(--critical); }
  .badge.kind { background: transparent; border: 1px solid var(--border); color: var(--ink-2); }
  .review-item .rt { flex: 1; }
  .review-item .rnote { font-size: .8rem; color: var(--ink-muted); }

  button.btn {
    border: none; background: var(--accent); color: #fff; font-family: inherit;
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: .9rem; font-weight: 600;
  }
  button.btn.ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  button.btn.sm { padding: 5px 12px; font-size: .82rem; }
  button.btn.danger { background: var(--critical); }

  /* forms */
  form .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  form label { display: block; font-size: .8rem; color: var(--ink-2); margin-bottom: 3px; }
  form input, form select, form textarea {
    font-family: inherit; font-size: .9rem; padding: 8px 10px; border-radius: 8px;
    border: 1px solid var(--baseline); background: var(--page); color: var(--ink-1);
    min-width: 0;
  }
  form textarea { width: 100%; resize: vertical; }
  form .field { flex: 1; min-width: 130px; }
  form .field.wide { flex-basis: 100%; }

  /* timer */
  .timer-box { text-align: center; padding: 10px 0; }
  .timer-box .clock { font-size: 2.6rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .timer-box .controls { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }

  /* edital */
  details.disc { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; background: var(--surface-1); }
  details.disc summary {
    cursor: pointer; padding: 12px 14px; display: flex; align-items: center; gap: 12px;
    list-style: none; font-weight: 600; flex-wrap: wrap;
  }
  details.disc summary::-webkit-details-marker { display: none; }
  .mini-bar { flex: 1; min-width: 120px; height: 8px; background: var(--grid); border-radius: 4px; overflow: hidden; }
  .mini-bar > div { height: 100%; background: var(--seq-450); border-radius: 4px; }
  .topic-row {
    display: flex; align-items: center; gap: 10px; padding: 8px 14px;
    border-top: 1px solid var(--grid); font-size: .9rem;
  }
  .topic-row .tname { flex: 1; }
  .status-chip {
    cursor: pointer; user-select: none; font-size: .75rem; font-weight: 600;
    padding: 3px 10px; border-radius: 999px; border: 1px solid var(--baseline);
    color: var(--ink-2); background: transparent; white-space: nowrap; font-family: inherit;
  }
  .status-chip.s1 { border-color: var(--seq-250); color: var(--seq-600); background: rgba(134,182,239,.18); }
  .status-chip.s2 { border-color: var(--seq-450); color: #fff; background: var(--seq-400); }
  .status-chip.s3 { border-color: var(--good); color: #fff; background: var(--good); }
  :root[data-theme="dark"] .status-chip.s1 { color: var(--seq-250); }
  @media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) .status-chip.s1 { color: var(--seq-250); } }

  /* tables */
  table.data { width: 100%; border-collapse: collapse; font-size: .88rem; }
  table.data th { text-align: left; color: var(--ink-2); font-weight: 600; padding: 6px 8px; border-bottom: 1px solid var(--baseline); }
  table.data td { padding: 6px 8px; border-bottom: 1px solid var(--grid); font-variant-numeric: tabular-nums; }
  .table-scroll { overflow-x: auto; }

  /* charts */
  .chart-wrap { position: relative; }
  .chart-wrap svg { display: block; width: 100%; height: auto; }
  .viz-tooltip {
    position: fixed; pointer-events: none; z-index: 50; display: none;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; font-size: .8rem; box-shadow: 0 4px 14px rgba(0,0,0,.18);
    max-width: 240px;
  }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: .8rem; color: var(--ink-2); margin: 6px 2px; }
  .legend .li { display: flex; align-items: center; gap: 6px; }
  .legend .sw { width: 10px; height: 10px; border-radius: 3px; }

  /* método (professor) */
  .lesson { border-left: 3px solid var(--accent); padding: 4px 0 4px 14px; margin: 14px 0; }
  .lesson h3 { margin-top: 0; }
  .lesson p, .lesson li { font-size: .93rem; color: var(--ink-2); margin-bottom: 6px; }
  .lesson strong { color: var(--ink-1); }
  .lesson ul, .lesson ol { padding-left: 20px; margin: 6px 0; }
  kbd.chip { background: var(--accent-wash); color: var(--accent); border-radius: 6px; padding: 1px 7px; font-family: inherit; font-size: .85em; font-weight: 600; }

  /* quiz */
  .quiz-q { font-size: 1rem; margin: 10px 0 14px; line-height: 1.6; }
  .quiz-q code, .fcard code { background: var(--accent-wash); border-radius: 4px; padding: 1px 6px; font-size: .9em; }
  .quiz-opt {
    display: flex; gap: 10px; align-items: flex-start; width: 100%; text-align: left;
    border: 1px solid var(--border); background: transparent; color: var(--ink-1);
    font-family: inherit; font-size: .93rem; line-height: 1.5;
    padding: 10px 14px; border-radius: 10px; margin-bottom: 8px; cursor: pointer;
  }
  .quiz-opt:hover:not(:disabled) { background: var(--accent-wash); border-color: var(--accent); }
  .quiz-opt:disabled { cursor: default; opacity: .75; }
  .quiz-opt .letter { font-weight: 700; color: var(--ink-2); }
  .quiz-opt.is-correct { border-color: var(--good); background: rgba(12,163,12,0.12); opacity: 1; }
  .quiz-opt.is-wrong { border-color: var(--critical); background: rgba(208,59,59,0.12); opacity: 1; }
  .quiz-fb { border-radius: 10px; padding: 12px 14px; margin: 10px 0; font-size: .92rem; border: 1px solid var(--border); }
  .quiz-fb.ok { background: rgba(12,163,12,0.10); }
  .quiz-fb.nok { background: rgba(208,59,59,0.08); }
  .quiz-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
  /* flashcards */
  .fcard {
    border: 1px solid var(--border); border-radius: 14px; padding: 26px 22px;
    min-height: 190px; display: flex; flex-direction: column; justify-content: center;
    text-align: center; font-size: 1.02rem; background: var(--page); cursor: pointer;
  }
  .fcard .side-label { font-size: .72rem; color: var(--ink-muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
  .fcard .back-text { font-size: .95rem; color: var(--ink-2); text-align: left; white-space: pre-line; }
  .fcard-controls { display: flex; gap: 10px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
  .btn.good { background: var(--good); }

  .empty { color: var(--ink-muted); font-size: .88rem; padding: 8px 0; }
  .progress-outer { height: 10px; background: var(--grid); border-radius: 5px; overflow: hidden; margin: 6px 0 2px; }
  .progress-outer > div { height: 100%; background: var(--seq-450); border-radius: 5px; transition: width .3s; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--ink-1); color: var(--page); padding: 10px 20px; border-radius: 10px;
    font-size: .9rem; z-index: 100; display: none;
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <h1>🎯 Guia BB — Agente de Tecnologia</h1>
    <span class="sub" id="header-date"></span>
    <span class="spacer"></span>
    <button class="theme-btn" id="theme-toggle" title="Alternar tema">🌗 Tema</button>
  </header>

  <nav class="tabs" id="tabs">
    <button data-tab="hoje" class="active">📅 Hoje</button>
    <button data-tab="metodo">🧑‍🏫 Método</button>
    <button data-tab="quiz">🧪 Quiz</button>
    <button data-tab="cartoes">📇 Cartões</button>
    <button data-tab="materiais">📚 Materiais</button>
    <button data-tab="registrar">✍️ Registrar</button>
    <button data-tab="edital">📖 Edital</button>
    <button data-tab="progresso">📈 Progresso</button>
  </nav>

  <main>
    <section class="tab active" id="tab-hoje"></section>
    <section class="tab" id="tab-metodo"></section>
    <section class="tab" id="tab-quiz"></section>
    <section class="tab" id="tab-cartoes"></section>
    <section class="tab" id="tab-materiais"></section>
    <section class="tab" id="tab-registrar"></section>
    <section class="tab" id="tab-edital"></section>
    <section class="tab" id="tab-progresso"></section>
  </main>
</div>

<div class="viz-tooltip" id="viz-tooltip"></div>
<div class="toast" id="toast"></div>

<script>

/* ============================================================
   DADOS ESTÁTICOS
============================================================ */

{id:"j02",disc:"TI",top:"Java — NullPointerException",q:"Em Java, uma NullPointerException é lançada quando:",
 o:["uma variável local primitiva não é inicializada","se invoca um método ou acessa um atributo por meio de uma referência null","ocorre divisão inteira por zero","um índice de array é excedido","o código não compila"],a:1,
 exp:"NPE = usar uma referência que aponta para null. Divisão por zero inteira = ArithmeticException; índice excedido = ArrayIndexOutOfBoundsException; local não inicializada = ERRO DE COMPILAÇÃO.",trap:"NPE é erro de EXECUÇÃO; variável local não inicializada nem compila. A banca mistura os dois."},
{id:"j03",disc:"TI",top:"Java — String imutável",q:"Considere: String s = \"BB\"; s.concat(\"2026\"); System.out.println(s); — a saída será:",
 o:["BB2026","2026BB","BB","2026","erro de compilação"],a:2,
 exp:"String é IMUTÁVEL: concat devolve uma NOVA string, que foi descartada (o retorno não foi atribuído). s continua \"BB\".",trap:"Métodos de String nunca alteram o objeto original — sempre retornam um novo."},
{id:"j04",disc:"TI",top:"Java — sobrecarga × sobrescrita",q:"Em Java, a SOBRECARGA (overloading) de métodos ocorre quando:",
 o:["uma subclasse redefine um método herdado com a mesma assinatura","métodos com o mesmo nome possuem listas de parâmetros diferentes na mesma classe","um método é declarado como final","dois métodos diferem apenas no tipo de retorno","um método estático acessa atributos de instância"],a:1,
 exp:"Sobrecarga: mesmo nome, parâmetros diferentes, resolvida em COMPILAÇÃO. Sobrescrita (override): subclasse redefine método com MESMA assinatura, resolvida em EXECUÇÃO (polimorfismo). Mudar só o retorno não compila.",trap:"sobreCARGA = mesma Classe; sobreSCRITA = Subclasse."},
{id:"j05",disc:"TI",top:"Estruturas — pilha e fila",q:"As estruturas de dados pilha e fila seguem, respectivamente, as políticas:",
 o:["FIFO e LIFO","LIFO e FIFO","LIFO e LIFO","FIFO e FIFO","aleatória e sequencial"],a:1,
 exp:"Pilha = LIFO (último a entrar, primeiro a sair — ex.: desfazer/Ctrl+Z, pilha de chamadas). Fila = FIFO (primeiro a entrar, primeiro a sair — ex.: fila de impressão).",trap:"PiLha = LIFO (o L ajuda a lembrar)."},
{id:"j06",disc:"TI",top:"Estruturas — complexidade",q:"Sobre complexidade média de acesso, é correto afirmar:",
 o:["a busca por chave em uma tabela hash (HashMap) é O(1) em média","o acesso por índice em um ArrayList é O(n)","a busca em árvore binária balanceada é O(n)","o acesso por índice em lista encadeada é O(1)","a busca linear em vetor não ordenado é O(log n)"],a:0,
 exp:"Hash: O(1) médio. ArrayList por índice: O(1). Árvore balanceada: O(log n). Lista encadeada por índice: O(n). Busca linear: O(n). Busca binária (vetor ORDENADO): O(log n).",trap:"Busca binária exige vetor ORDENADO — sem isso, é O(n)."},
{id:"j07",disc:"TI",top:"Java — leitura de código",q:"Considere: int x = 5; int y = x++ + ++x; — após a execução, os valores de x e y são, respectivamente:",
 o:["7 e 12","6 e 11","7 e 11","6 e 12","7 e 13"],a:0,
 exp:"x++ usa 5 e incrementa (x=6); ++x incrementa antes e usa 7 (x=7). y = 5 + 7 = 12.",trap:"Pós-incremento usa e depois soma; pré-incremento soma e depois usa."},
{id:"j08",disc:"TI",top:"APIs REST",q:"Nos serviços REST, os métodos HTTP considerados idempotentes (repetir a mesma requisição produz o mesmo estado no servidor) incluem:",
 o:["GET, PUT e DELETE","POST e PATCH","apenas POST","apenas os métodos com corpo","nenhum método HTTP é idempotente"],a:0,
 exp:"GET (só leitura), PUT (substitui pelo mesmo estado) e DELETE (já apagado continua apagado) são idempotentes. POST cria um novo recurso a cada chamada — não é.",trap:"POST é o não-idempotente clássico das provas."},

// ---------- TI: ENGENHARIA DE SOFTWARE ----------
{id:"s01",disc:"TI",top:"Scrum",q:"No framework Scrum, a responsabilidade por ordenar (priorizar) o Product Backlog é do(a):",
 o:["Scrum Master","Product Owner","time de desenvolvimento, coletivamente","gerente de projetos","stakeholders, por votação"],a:1,
 exp:"O PO é o dono do Product Backlog e o maximizador de valor. O Scrum Master é facilitador do processo (não é chefe); o time define COMO fazer.",trap:"Scrum Master não prioriza backlog nem manda no time — distrator recorrente."},
{id:"s02",disc:"TI",top:"Kanban",q:"Uma característica essencial do método Kanban é:",
 o:["sprints com duração fixa de duas semanas","a limitação do trabalho em progresso (WIP)","papéis obrigatórios de PO e Scrum Master","estimativas obrigatórias em story points","entregas somente ao final do projeto"],a:1,
 exp:"Kanban = fluxo contínuo com limite de WIP por coluna. Sprints e papéis fixos são do Scrum — Kanban não os exige.",trap:"Sprint é Scrum; WIP limitado é Kanban. As bancas trocam as características."},
{id:"s03",disc:"TI",top:"CI/CD",q:"A prática de Integração Contínua (CI) consiste em:",
 o:["integrar e testar o código automaticamente a cada alteração enviada ao repositório","implantar manualmente em produção uma vez por mês","escrever testes somente após o deploy","manter branches isoladas por longos períodos","dispensar o uso de controle de versão"],a:0,
 exp:"CI: commits frequentes disparam build + testes automáticos, detectando quebras cedo. CD estende isso até a entrega/implantação automatizada.",trap:"CI é sobre INTEGRAR + TESTAR cedo e sempre; deploy automatizado é o CD."},
{id:"s04",disc:"TI",top:"TDD",q:"No desenvolvimento orientado a testes (TDD), a sequência correta do ciclo é:",
 o:["codificar → testar → documentar","escrever o teste (que falha) → escrever o código mínimo para passar → refatorar","refatorar → testar → codificar","testar em produção → corrigir → reescrever","escrever todos os testes ao final do projeto"],a:1,
 exp:"Ciclo red-green-refactor: teste que falha (red) → código mínimo que passa (green) → refatorar mantendo os testes verdes.",trap:"No TDD o teste vem ANTES do código — é a definição."},

// ---------- TI: SEGURANÇA ----------
{id:"g01",disc:"TI",top:"Criptografia simétrica × assimétrica",q:"Sobre algoritmos criptográficos, é correto afirmar:",
 o:["o AES é um algoritmo de criptografia assimétrica","o RSA utiliza a mesma chave para cifrar e decifrar","o AES é simétrico (mesma chave) e o RSA é assimétrico (par de chaves pública/privada)","algoritmos simétricos são sempre mais lentos que os assimétricos","o SHA-256 é um algoritmo de criptografia simétrica"],a:2,
 exp:"AES = simétrico (uma chave secreta compartilhada, rápido). RSA = assimétrico (par público/privado, lento — usado para trocar chaves e assinar). SHA-256 é HASH, não criptografia.",trap:"Simétrico é o RÁPIDO; assimétrico resolve a distribuição de chaves. Hash não é criptografia."},
{id:"g02",disc:"TI",top:"Assinatura digital",q:"Na assinatura digital, o remetente assina o documento utilizando:",
 o:["a chave pública do destinatário","a sua própria chave privada","a chave privada do destinatário","uma chave simétrica combinada por telefone","o certificado da autoridade certificadora"],a:1,
 exp:"Assina-se com a chave PRIVADA do emissor; qualquer um verifica com a pública dele. Garante autenticidade, integridade e não repúdio — mas NÃO confidencialidade (para isso, cifra-se com a pública do destinatário).",trap:"Assinar = minha privada. Cifrar para alguém = pública dele. Decore o par."},
{id:"g03",disc:"TI",top:"Funções hash",q:"Uma função de hash criptográfico, como o SHA-256, caracteriza-se por:",
 o:["ser reversível mediante a chave correta","produzir saída de tamanho fixo a partir de entrada de qualquer tamanho, de forma unidirecional","garantir a confidencialidade dos dados","produzir saídas de tamanho proporcional à entrada","substituir a necessidade de senhas"],a:1,
 exp:"Hash: unidirecional (não se 'deshasheia'), saída de tamanho fixo, e qualquer mudança na entrada muda o resultado (efeito avalanche). Serve à INTEGRIDADE, não à confidencialidade.",trap:"Hash não cifra nada — não existe 'descriptografar um hash'."},
{id:"g04",disc:"TI",top:"HTTPS/TLS",q:"O protocolo HTTPS:",
 o:["opera, por padrão, na porta 80","utiliza TLS, combinando criptografia assimétrica na negociação e simétrica na transmissão dos dados","dispensa o uso de certificados digitais","criptografa apenas as senhas do usuário","é mais rápido que o HTTP por ser binário"],a:1,
 exp:"HTTPS = HTTP sobre TLS, porta 443. Modelo híbrido: assimétrica para autenticar o servidor (certificado) e acordar a chave de sessão; simétrica para o tráfego (desempenho).",trap:"HTTPS = 443; HTTP = 80. E o TLS protege TODO o tráfego, não só senhas."},
{id:"g05",disc:"TI",top:"IDS × IPS",q:"A diferença fundamental entre IDS e IPS é que o IPS:",
 o:["apenas registra logs para auditoria posterior","atua em linha (inline), podendo bloquear o tráfego malicioso em tempo real","é instalado apenas nas estações de trabalho","substitui completamente o firewall","detecta somente ataques internos"],a:1,
 exp:"IDS Detecta e alerta (passivo, fora do fluxo). IPS Previne: fica no caminho do tráfego e bloqueia. Nenhum dos dois substitui o firewall — são camadas complementares.",trap:"D de Detecção (avisa) × P de Prevenção (bloqueia)."},
{id:"g06",disc:"TI",top:"Phishing",q:"O phishing é um ataque que se caracteriza por:",
 o:["explorar falhas de buffer overflow no servidor","interceptar fisicamente o cabeamento de rede","usar engenharia social — mensagens falsas que imitam fontes confiáveis — para roubar dados da vítima","sobrecarregar o servidor com requisições em massa","alterar registros DNS do provedor"],a:2,
 exp:"Phishing explora o FATOR HUMANO: e-mail/SMS/site falso imitando banco, empresa etc. para fisgar credenciais e dados. Sobrecarga em massa = DoS/DDoS.",trap:"Phishing ataca pessoas, não servidores. Se o alvo é o usuário, é engenharia social."},
{id:"g07",disc:"TI",top:"SQL Injection",q:"A principal medida de prevenção contra SQL Injection é:",
 o:["criptografar todo o banco de dados","utilizar consultas parametrizadas (prepared statements) e validar entradas","bloquear a porta 1521 no firewall","usar apenas o método HTTP POST","trocar o SGBD por um banco NoSQL"],a:1,
 exp:"Prepared statements separam código SQL dos dados: a entrada do usuário nunca é interpretada como comando. Validação de entrada complementa. Criptografia não impede a injeção.",trap:"OWASP: injeção se previne PARAMETRIZANDO, não cifrando."},
{id:"g08",disc:"TI",top:"XSS",q:"O ataque Cross-Site Scripting (XSS) consiste em:",
 o:["injetar script malicioso em uma página para que ele execute no navegador das vítimas","adivinhar senhas por tentativa e erro","forjar o endereço IP de origem dos pacotes","explorar consultas SQL mal construídas","criptografar os arquivos do servidor"],a:0,
 exp:"XSS injeta JavaScript em páginas vistas por outros usuários (roubo de sessão/cookies). Alvo: o NAVEGADOR da vítima. SQLi ataca o banco; força bruta, senhas; spoofing, IP.",trap:"XSS roda no cliente (navegador); SQL Injection, no banco. Não misture."},
{id:"g09",disc:"TI",top:"MFA",q:"Um usuário que se autentica com senha e, em seguida, confirma um código gerado no aplicativo do celular está utilizando:",
 o:["dois fatores do mesmo tipo (algo que se sabe)","autenticação de dois fatores: algo que se sabe + algo que se tem","biometria comportamental","single sign-on (SSO)","apenas um fator, repetido duas vezes"],a:1,
 exp:"Fatores: algo que você SABE (senha), TEM (celular/token) e É (biometria). Senha + código do app = dois fatores DISTINTOS = 2FA legítimo. Senha + PIN seriam o mesmo fator (sabe + sabe).",trap:"Dois segredos decorados = 1 fator só. MFA exige tipos diferentes."},
{id:"g10",disc:"TI",top:"Malware — ransomware",q:"O malware que criptografa os arquivos da vítima e exige pagamento para restabelecer o acesso é o:",
 o:["spyware","adware","ransomware","keylogger","worm"],a:2,
 exp:"Ransom = resgate. Spyware espiona; keylogger captura teclas; adware exibe propaganda; worm se replica pela rede sozinho.",trap:"Worm × vírus: worm se propaga sozinho; vírus precisa de hospedeiro."},

// ---------- TI: REDES / LINUX / GIT ----------
{id:"r01",disc:"TI",top:"Modelo OSI",q:"No modelo OSI, os protocolos TCP e UDP operam na camada de:",
 o:["rede (camada 3)","transporte (camada 4)","sessão (camada 5)","enlace (camada 2)","aplicação (camada 7)"],a:1,
 exp:"Transporte = camada 4 (TCP/UDP, portas). IP fica na 3 (rede); Ethernet na 2 (enlace); HTTP/DNS na 7 (aplicação).",trap:"Porta = camada 4; endereço IP = camada 3; MAC = camada 2."},
{id:"r02",disc:"TI",top:"Portas padrão",q:"As portas padrão dos serviços SSH, HTTPS e DNS são, respectivamente:",
 o:["21, 80 e 25","22, 443 e 53","23, 443 e 67","22, 8080 e 110","443, 22 e 53"],a:1,
 exp:"SSH 22, HTTPS 443, DNS 53. Outras cobradas: HTTP 80, FTP 21, Telnet 23, SMTP 25, POP3 110, IMAP 143, RDP 3389.",trap:"Monte um flashcard só de portas — é ponto garantido em prova de TI."},
{id:"r03",disc:"TI",top:"TCP × UDP",q:"Em comparação com o UDP, o protocolo TCP:",
 o:["é orientado a conexão, garantindo entrega e ordem dos segmentos","é mais rápido por dispensar confirmações","é indicado para streaming em tempo real por seu menor overhead","não utiliza portas","não realiza controle de fluxo"],a:0,
 exp:"TCP: conexão (handshake de 3 vias), confirmação, retransmissão, ordem, controle de fluxo/congestionamento. UDP: sem garantias, leve — bom para streaming, VoIP, DNS.",trap:"Confiabilidade = TCP; velocidade/tempo real = UDP."},
{id:"r04",disc:"TI",top:"IPv6",q:"Os endereços IPv6 possuem comprimento de:",
 o:["32 bits","64 bits","128 bits","256 bits","48 bits"],a:2,
 exp:"IPv6 = 128 bits (8 grupos hexadecimais), contra 32 bits do IPv4. 48 bits é o MAC address.",trap:"IPv4 32 / IPv6 128 / MAC 48 — trio numérico de prova."},
{id:"r05",disc:"TI",top:"DNS",q:"A função principal do serviço DNS é:",
 o:["atribuir endereços IP dinamicamente aos hosts","traduzir nomes de domínio em endereços IP","criptografar o tráfego entre cliente e servidor","rotear pacotes entre redes distintas","autenticar usuários no domínio"],a:1,
 exp:"DNS resolve nomes (bb.com.br) em IPs. Atribuição dinâmica de IP é o DHCP; roteamento é função do roteador/protocolos de roteamento.",trap:"DNS traduz; DHCP distribui IP. As bancas trocam os dois."},
{id:"r06",disc:"TI",top:"Linux — chmod",q:"No Linux, o comando chmod 754 arquivo.sh atribui as permissões:",
 o:["rwx r-x r--","rwx rw- r--","r-x rwx r--","rw- r-- r--","rwx r-x rw-"],a:0,
 exp:"7 = rwx (4+2+1) para o dono; 5 = r-x (4+1) para o grupo; 4 = r-- para os demais. Leitura=4, escrita=2, execução=1.",trap:"Decore: 7=rwx, 6=rw-, 5=r-x, 4=r--. 755 e 644 são os valores mais cobrados."},
{id:"r07",disc:"TI",top:"Linux — grep",q:"No Linux, o comando utilizado para buscar linhas que correspondam a um padrão (inclusive expressões regulares) em arquivos de texto é:",
 o:["awk","sed","grep","cat","chmod"],a:2,
 exp:"grep busca padrões. sed edita fluxo (substituições); awk processa colunas/relatórios; cat exibe/concatena.",trap:"Buscar = grep; substituir = sed; colunas = awk."},
{id:"r08",disc:"TI",top:"Linux — pipe",q:"No shell do Linux, o operador | (pipe) tem a função de:",
 o:["redirecionar a saída de um comando para um arquivo","encadear comandos, enviando a saída padrão de um para a entrada padrão do próximo","executar comandos em segundo plano","comparar o conteúdo de dois arquivos","listar processos em execução"],a:1,
 exp:"pipe conecta stdout → stdin: ps aux | grep java. Redirecionar para arquivo é > ou >>; segundo plano é &.",trap:"| conecta comandos; > grava em arquivo. Ambos caem juntos como distratores."},
{id:"r09",disc:"TI",top:"Git — merge × rebase",q:"No Git, em comparação com o merge, o rebase:",
 o:["preserva o histórico original criando um commit de mesclagem","reaplica os commits sobre a nova base, produzindo histórico linear (reescreve o histórico)","é a única forma de integrar branches","não pode gerar conflitos","apaga a branch de origem automaticamente"],a:1,
 exp:"Merge junta com um commit de mesclagem preservando o histórico; rebase reaplica os commits sobre a ponta da outra branch — histórico linear, mas reescrito (evitar em branches compartilhadas). Ambos podem gerar conflito.",trap:"Rebase reescreve história — por isso a regra 'não rebasear branch pública'."},
{id:"r10",disc:"TI",top:"Docker × VM",q:"Em comparação com máquinas virtuais, os contêineres (ex.: Docker):",
 o:["virtualizam o hardware completo, incluindo o sistema operacional convidado","compartilham o kernel do sistema hospedeiro, sendo mais leves e rápidos para iniciar","exigem um hipervisor do tipo 1","oferecem isolamento físico total entre aplicações","não podem ser usados em ambientes de produção"],a:1,
 exp:"Contêiner empacota app + dependências e compartilha o kernel do host (leve, sobe em segundos). VM virtualiza hardware e carrega SO completo (isolamento maior, custo maior).",trap:"Contêiner NÃO tem SO convidado completo — é a diferença central para VM."},

// ---------- INGLÊS ----------
{id:"i01",disc:"Inglês",top:"Conectivos",q:"In the sentence \"The system was tested twice; however, a critical bug reached production\", the word HOWEVER expresses:",
 o:["addition","contrast","cause","purpose","condition"],a:1,
 exp:"However = contraste/oposição (equivale a 'no entanto'). Adição seria moreover/furthermore; causa, because/since; propósito, in order to.",trap:"Conectivos são presença garantida em prova de inglês — monte um flashcard deles."},
{id:"i02",disc:"Inglês",top:"Falsos cognatos",q:"In \"The bank actually increased its investments in cybersecurity\", the word ACTUALLY means:",
 o:["atualmente","na verdade / de fato","raramente","parcialmente","antigamente"],a:1,
 exp:"Actually = na verdade (falso cognato). 'Atualmente' em inglês é currently/nowadays.",trap:"Outros clássicos: pretend = fingir; push = empurrar; college = faculdade; parents = pais."},
{id:"i03",disc:"Inglês",top:"Modais",q:"In \"All employees must complete the security training\", the modal MUST expresses:",
 o:["possibility","permission","obligation","suggestion","ability"],a:2,
 exp:"Must = obrigação/necessidade. Possibilidade = may/might; permissão = may/can; sugestão = should; habilidade = can.",trap:"Should sugere; must obriga. Bancas exploram essa diferença de força."},
{id:"i04",disc:"Inglês",top:"Preposições",q:"Complete: \"The IT team is responsible ___ protecting customer data.\"",
 o:["by","for","with","at","about"],a:1,
 exp:"Responsible FOR = responsável por. Combinações fixas (collocations) como esta são cobradas diretamente.",trap:"Outras fixas: depend ON, interested IN, good AT, worried ABOUT."},

// ---------- ATUALIDADES ----------
{id:"a01",disc:"Atualidades",top:"Open Finance — evolução",q:"A evolução do Open Banking para o Open Finance representou:",
 o:["a restrição do compartilhamento apenas a dados de conta-corrente","a ampliação do escopo para além dos dados bancários, incluindo investimentos, seguros e câmbio","o fim do consentimento do cliente","a transferência da gestão do sistema para os bancos privados","a fusão do Pix com o sistema de cartões"],a:1,
 exp:"Open Banking (fase inicial) tratava de dados bancários; o Open Finance amplia o ecossistema para investimentos, seguros, previdência e câmbio — sempre com consentimento.",trap:"Banking ⊂ Finance: a mudança de nome marca a AMPLIAÇÃO do escopo."},
{id:"a02",disc:"Atualidades",top:"IA no setor bancário",q:"Sobre o uso de inteligência artificial generativa em bancos, é correto afirmar:",
 o:["por ser precisa, dispensa revisão humana nas respostas ao cliente","não apresenta riscos de vazamento de dados","seu uso em atendimento exige controles como supervisão humana e proteção de dados, dado o risco de respostas incorretas ('alucinações')","é proibida pelo Bacen em instituições financeiras","substitui integralmente as políticas de crédito"],a:2,
 exp:"IA generativa pode 'alucinar' (gerar informação falsa com confiança) e expor dados sensíveis — por isso bancos adotam supervisão humana, guardrails e governança de IA. Não há proibição do Bacen; há diretrizes de governança e gestão de riscos.",trap:"Em atualidades, alternativas absolutas ('dispensa', 'não apresenta riscos', 'proibida') costumam estar erradas."},
{id:"a03",disc:"Atualidades",top:"Fintechs",q:"As fintechs de crédito no Brasil (SCD e SEP):",
 o:["operam sem qualquer regulação estatal","são autorizadas e supervisionadas pelo Banco Central","são reguladas pela CVM","não podem conceder empréstimos","funcionam apenas como correspondentes bancários"],a:1,
 exp:"SCD (Sociedade de Crédito Direto) e SEP (empréstimo entre pessoas) são categorias criadas pelo CMN e autorizadas/supervisionadas pelo BACEN — fintech regulada, não terra sem lei.",trap:"'Fintech não é regulada' é distrator garantido — SCD/SEP respondem ao Bacen."},
{id:"a04",disc:"Atualidades",top:"ASG/ESG",q:"A sigla ASG (ou ESG), central nas finanças sustentáveis, refere-se aos critérios:",
 o:["Ambiental, Social e de Governança","Administrativo, Setorial e Gerencial","Ambiental, Securitário e Global","Atuarial, Social e Governamental","Ambiental, Sistêmico e Geopolítico"],a:0,
 exp:"Environmental, Social and Governance. Bancos avaliam riscos climáticos, impacto social e práticas de governança em crédito e investimento — há normas do CMN/Bacen sobre gerenciamento de risco social, ambiental e climático.",trap:"G é de GOVERNANÇA (corporativa), não de 'governo'."},

// ---------- BANCÁRIOS (reforço) ----------
{id:"b13",disc:"Bancários",top:"CMN — composição",q:"O Conselho Monetário Nacional é composto por:",
 o:["presidente do Bacen, presidente da CVM e ministro da Fazenda","ministro da Fazenda (presidente do conselho), ministro do Planejamento e Orçamento e presidente do Bacen","presidentes de todos os bancos públicos federais","ministro da Fazenda e diretores do Bacen","presidente da República, ministro da Fazenda e presidente do Bacen"],a:1,
 exp:"3 membros: Fazenda (preside), Planejamento e Orçamento, e presidente do Bacen.",trap:"CVM NÃO tem assento no CMN — distrator recorrente."},
{id:"b14",disc:"Bancários",top:"Compulsório",q:"O aumento da alíquota do depósito compulsório tem como efeito:",
 o:["aumentar a liquidez da economia","reduzir a capacidade de os bancos concederem crédito","reduzir a taxa Selic automaticamente","aumentar o multiplicador bancário","estimular o consumo das famílias"],a:1,
 exp:"Compulsório maior = mais dinheiro preso no Bacen = menos crédito disponível = política monetária contracionista.",trap:"Compulsório sobe → liquidez desce. Relação sempre inversa."},
{id:"b15",disc:"Bancários",top:"Open market",q:"Quando o Banco Central deseja ENXUGAR a liquidez da economia via operações de mercado aberto, ele:",
 o:["compra títulos públicos","vende títulos públicos","reduz o compulsório","reduz a taxa de redesconto","emite mais papel-moeda"],a:1,

{id:"b16",disc:"Bancários",top:"FGC — teto global",q:"Sobre o Fundo Garantidor de Créditos (FGC), é correto afirmar:",

{id:"p09",disc:"Português",top:"Concordância — horas",q:"Assinale a frase correta:",

{id:"p10",disc:"Português",top:"Concordância — anexo",q:"Quanto à concordância, está correta a frase:",

{id:"p11",disc:"Português",top:"Há × a (tempo)",q:"Assinale a frase correta quanto ao emprego de 'há' e 'a':",

{id:"p12",disc:"Português",top:"Acerca de × há cerca de",q:"Assinale a frase correta:",

{id:"p13",disc:"Português",top:"Ao encontro de × de encontro a",q:"\"A proposta do sindicato veio ___ interesses dos funcionários, que a apoiaram.\" Preenche corretamente a lacuna:",

{id:"p14",disc:"Português",top:"Pronome relativo cujo",q:"Assinale a frase em que 'cujo' está corretamente empregado:",

{id:"p15",disc:"Português",top:"Senão × se não",q:"Assinale a frase correta:",
 o:["Estude, se não será reprovado.","Não fez outra coisa se não reclamar.","Se não estudar, será reprovado; não há alternativa senão estudar.","Senão chover, haverá prova.","Nada disse, senão que se cale."],a:2,

{id:"p16",disc:"Português",top:"Partícula 'se'",q:"Quanto à concordância com a partícula 'se', está correta a frase:",

{id:"p19",disc:"Português",top:"Ortografia/prosódia",q:"Assinale a opção em que a palavra está grafada corretamente:",

{id:"p20",disc:"Português",top:"Expressões viciosas",q:"Assinale a frase INADEQUADA à norma culta:",

{id:"p21",disc:"Português",top:"Vírgula antes de E",q:"Sobre o uso da vírgula antes da conjunção 'e', é correto afirmar:",

{id:"p22",disc:"Português",top:"Haja vista",q:"Assinale a frase correta:",

/* ============================================================
   ESTADO
============================================================ */
const LS_KEY = "bb-estudos-v1";
let state = loadState();

function defaultState() {
  return {
    version: 1,
    startDate: todayStr(),
    sessions: [],      // {id, date, disc, minutes, questions, correct}
    reviews: [],       // {id, label, disc, kind: 'erro'|'topico', created, steps:[{offset, due, done}], note}
    errors: [],        // {id, date, disc, topic, cause, rule, trap}
    simulados: [],     // {id, date, name, basicos, especificos, total, redacao, obs}
    edital: {},        // topicKey -> 0..3
    blocksDone: {},    // date -> [blockIds]
    quizStats: {},     // qid -> {seen, right, lastWrong}
    cardsSrs: {},      // cardId -> {step, due}
    plano: {},         // tarefaId -> true (aba Materiais)
    redacoes: [],      // {id, date, tema, nota, por, obs}
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  } catch (e) { return defaultState(); }
}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }

/* ============================================================
   HELPERS
============================================================ */
function todayStr(d) {
  const dt = d || new Date();
  const off = dt.getTimezoneOffset();
  return new Date(dt.getTime() - off * 60000).toISOString().slice(0, 10);
}
function addDays(iso, n) {
  const d = new Date(iso + "T12:00:00");
  d.setDate(d.getDate() + n);
  return todayStr(d);
}
function diffDays(a, b) { // b - a em dias
  return Math.round((new Date(b + "T12:00:00") - new Date(a + "T12:00:00")) / 86400000);
}
function fmtBR(iso) {
  if (!iso) return "—";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y.slice(2)}`;
}
function uid() { return Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4); }
function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
function weekStart(iso) { // segunda-feira da semana
  const d = new Date(iso + "T12:00:00");
  const dow = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - dow);
  return todayStr(d);
}
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(t._h);
  t._h = setTimeout(() => (t.style.display = "none"), 2600);
}
function topicKey(di, ti) { return `t${di}_${ti}`; }
function hoursFmt(min) {
  const h = Math.floor(min / 60), m = min % 60;
  return h ? `${h}h${m ? String(m).padStart(2, "0") : ""}` : `${m}m`;
}
function seriesColor(n) {
  return getComputedStyle(document.documentElement).getPropertyValue(`--series-${n}`).trim();
}

/* ============================================================
   REVISÃO ESPAÇADA
============================================================ */
function createReview(label, disc, kind, note) {
  const created = todayStr();
  state.reviews.push({
    id: uid(), label, disc, kind, created, note: note || "",
    steps: REVIEW_OFFSETS.map(o => ({ offset: o, due: addDays(created, o), done: null })),
  });
}
function dueReviews(onDate) {
  const items = [];
  for (const r of state.reviews) {
    const step = r.steps.find(s => !s.done && s.due <= onDate);
    if (step) items.push({ review: r, step, late: diffDays(step.due, onDate) });
  }
  items.sort((a, b) => b.late - a.late);
  return items;
}
function upcomingReviews(onDate, days) {
  let n = 0;
  for (const r of state.reviews) {
    const step = r.steps.find(s => !s.done);
    if (step && step.due > onDate && diffDays(onDate, step.due) <= days) n++;
  }
  return n;
}
function markReviewDone(reviewId) {
  const r = state.reviews.find(x => x.id === reviewId);
  if (!r) return;
  const step = r.steps.find(s => !s.done);
  if (step) step.done = todayStr();
  save(); renderHoje();
  const left = r.steps.filter(s => !s.done).length;
  toast(left ? `✓ Revisado! Próxima revisão em ${fmtBR(r.steps.find(s => !s.done).due)}` : "✓ Ciclo de revisão completo — item arquivado!");
}

/* ============================================================
   MÉTRICAS
============================================================ */
function weekSessions(refDate) {
  const ws = weekStart(refDate);
  const we = addDays(ws, 6);
  return state.sessions.filter(s => s.date >= ws && s.date <= we);
}
function weekMinutes(refDate) { return weekSessions(refDate).reduce((a, s) => a + (s.minutes || 0), 0); }
function accuracyByDisc() {
  const map = {};
  for (const s of state.sessions) {
    if (!s.questions) continue;
    map[s.disc] = map[s.disc] || { q: 0, c: 0 };
    map[s.disc].q += s.questions;
    map[s.disc].c += s.correct || 0;
  }
  return map;
}
function streak() {
  let n = 0, d = todayStr();
  const hasActivity = date =>
    state.sessions.some(s => s.date === date) || (state.blocksDone[date] || []).length > 0;
  if (!hasActivity(d)) d = addDays(d, -1); // hoje ainda não estudou não quebra o streak
  while (hasActivity(d)) { n++; d = addDays(d, -1); }
  return n;
}
function editalStats() {
  const per = EDITAL.map((g, di) => {
    let dom = 0, started = 0;
    g.topics.forEach((_, ti) => {
      const st = state.edital[topicKey(di, ti)] || 0;
      if (st === 3) dom++;
      if (st > 0) started++;
    });
    return { disc: g.disc, total: g.topics.length, dom, started };
  });
  const total = per.reduce((a, p) => a + p.total, 0);
  const dom = per.reduce((a, p) => a + p.dom, 0);
  return { per, total, dom };
}

/* ============================================================
   COACH (o professor)
============================================================ */
function coachMessages() {
  const msgs = [];
  const today = todayStr();
  const due = dueReviews(today);
  const late = due.filter(d => d.late > 0);
  const wm = weekMinutes(today);
  const dow = new Date().getDay();

  if (state.sessions.length === 0 && state.simulados.length === 0 && Object.keys(state.edital).length === 0 && Object.keys(state.plano).length === 0) {
    msgs.push({ level: "info", ico: "👋", text: "Bem-vindo! Comece pela aba 🧑‍🏫 Método para aprender COMO estudar. Depois vá em 📚 Materiais e execute a Semana 0 (kit de materiais + simulado diagnóstico). O roteiro completo até a prova está lá." });
    return msgs;
  }

  const s0tarefas = PLANO_MATERIAIS[0].semanas[0].tarefas;
  const s0left = s0tarefas.filter(t => !state.plano[t.id]).length;
  if (s0left > 0)
    msgs.push({ level: "warning", ico: "🎒", text: `Kit de materiais incompleto: faltam ${s0left} item(ns) da Semana 0 na aba 📚 Materiais (plataforma de questões, provas antigas, diagnóstico). Sem o kit, o resto do plano trava.` });
  if (late.length > 0)
    msgs.push({ level: "serious", ico: "⏰", text: `Você tem ${late.length} revisão(ões) ATRASADA(s). Revisão atrasada perde efeito — faça-as antes de estudar conteúdo novo hoje.` });
  else if (due.length > 0)
    msgs.push({ level: "warning", ico: "🔁", text: `${due.length} revisão(ões) vencendo hoje. Regra do método: revisar vem ANTES de aprender coisa nova. São só alguns minutos por item.` });
  else
    msgs.push({ level: "good", ico: "✅", text: "Nenhuma revisão pendente. Caminho livre para o plano do dia." });

  const cardsDue = dueCardsToday().length;
  if (cardsDue > 0)
    msgs.push({ level: "info", ico: "📇", text: `${cardsDue} cartão(ões) de memorização vencidos hoje — 5 minutos na aba Cartões resolvem.` });

  const pct = Math.round((wm / (META_HORAS_SEMANA * 60)) * 100);
  const diasRestantes = 7 - ((dow + 6) % 7);
  if (wm === 0 && dow >= 2)
    msgs.push({ level: "serious", ico: "📉", text: "Nenhuma hora registrada esta semana. Se estudou sem registrar, registre agora — sem números o método não funciona. Se não estudou: começa com 25 minutos no cronômetro, agora." });
  else if (pct < 50 && dow >= 4)
    msgs.push({ level: "warning", ico: "⚖️", text: `Semana em ${hoursFmt(wm)} de ${META_HORAS_SEMANA}h (${pct}%), com ${diasRestantes} dia(s) restando. Use o fim de semana para recuperar — mas sem virar noite: constância > heroísmo.` });
  else if (pct >= 100)
    msgs.push({ level: "good", ico: "🏆", text: `Meta semanal batida: ${hoursFmt(wm)}! Se estiver com energia, invista o extra em Bancários ou redação — nunca em mais TI.` });

  const lastSim = state.simulados.length ? state.simulados[state.simulados.length - 1] : null;
  if (!lastSim)
    msgs.push({ level: "warning", ico: "🧪", text: "Nenhum simulado registrado ainda. O diagnóstico (prova BB 2021 completa, 5h cronometradas) é o que calibra todo o resto do plano. Agende para o próximo sábado." });
  else if (diffDays(lastSim.date, today) > 14)
    msgs.push({ level: "warning", ico: "🧪", text: `Seu último simulado foi há ${diffDays(lastSim.date, today)} dias. O ciclo pede prova antiga a cada 2 semanas — agende para este sábado.` });

  const ws = weekStart(today);
  const redacaoFeita = state.sessions.some(s => s.disc === "Redação" && s.date >= ws) ||
    state.redacoes.some(r => r.date >= ws);
  if (!redacaoFeita && dow === 0)
    msgs.push({ level: "warning", ico: "✍️", text: "Hoje é domingo e a redação da semana ainda não foi registrada. Ela é ELIMINATÓRIA — 1h, manuscrita, 30 linhas. Tema sugerido na pasta redacao/temas.md." });

  const acc = accuracyByDisc();
  for (const [disc, v] of Object.entries(acc)) {
    if (v.q >= 30) {
      const p = Math.round((v.c / v.q) * 100);
      if (p < 60 && disc !== "TI")
        msgs.push({ level: "warning", ico: "🎯", text: `${disc} está em ${p}% de acerto (${v.c}/${v.q}). Abaixo de 60% = voltar à teoria desse tópico antes de fazer mais questões.` });
      if (p >= 80 && disc === "TI")
        msgs.push({ level: "good", ico: "💪", text: `TI está em ${p}% de acerto. Mantenha só o aquecimento (mini-simulados) e realoque energia para os Conhecimentos Básicos.` });
    }
  }

  const st = streak();
  if (st >= 3) msgs.push({ level: "good", ico: "🔥", text: `${st} dias seguidos de estudo. Constância é o que aprova — proteja a sequência com pelo menos 25 minutos até nos dias ruins.` });

  return msgs;
}

/* ============================================================
   CRONÔMETRO
============================================================ */
let timer = { running: false, elapsed: 0, lastTick: null, handle: null };
function timerToggle() {
  const btn = document.getElementById("timer-start");
  if (timer.running) {
    timer.running = false;
    clearInterval(timer.handle);
    if (btn) btn.textContent = "▶ Continuar";
  } else {
    timer.running = true;
    timer.lastTick = Date.now();
    timer.handle = setInterval(() => {
      timer.elapsed += Date.now() - timer.lastTick;
      timer.lastTick = Date.now();
      updateClockDisplay();
    }, 1000);
    if (btn) btn.textContent = "⏸ Pausar";
  }
}
function updateClockDisplay() {
  const c = document.getElementById("clock");
  if (!c) return;
  const s = Math.floor(timer.elapsed / 1000);
  c.textContent = [Math.floor(s / 3600), Math.floor((s % 3600) / 60), s % 60]
    .map(n => String(n).padStart(2, "0")).join(":");
  const btn = document.getElementById("timer-start");
  if (btn) btn.textContent = timer.running ? "⏸ Pausar" : (timer.elapsed ? "▶ Continuar" : "▶ Iniciar");
}
function timerSave() {
  const min = Math.round(timer.elapsed / 60000);
  if (min < 1) { toast("Menos de 1 minuto — nada para salvar."); return; }
  const disc = document.getElementById("timer-disc").value;
  state.sessions.push({ id: uid(), date: todayStr(), disc, minutes: min, questions: 0, correct: 0 });
  save(); timerReset(); renderHoje();
  toast(`💾 ${hoursFmt(min)} de ${disc} registrados! Fez questões? Complete na aba Registrar.`);
}
function timerReset() {
  timer.running = false; timer.elapsed = 0;
  clearInterval(timer.handle);
  updateClockDisplay();
}

function cycleTopic(di, ti) {
  const k = topicKey(di, ti);
  const next = ((state.edital[k] || 0) + 1) % 4;
  state.edital[k] = next;
  save();
  const details = [...document.querySelectorAll("details.disc")].map(d => d.open);
  renderEdital();
  [...document.querySelectorAll("details.disc")].forEach((d, i) => (d.open = details[i]));
  if (next === 3) toast("🏆 Tópico dominado! Não estude mais teoria disso — só manutenção via questões.");
}

/* ---------- gráfico: horas por semana (barras) ---------- */
function drawHorasChart() {
  const host = document.getElementById("chart-horas");
  if (!host) return;
  const weeks = [];
  let ws = weekStart(todayStr());
  for (let i = 7; i >= 0; i--) weeks.push(addDays(ws, -7 * i));
  const data = weeks.map(w => {
    const we = addDays(w, 6);
    const min = state.sessions.filter(s => s.date >= w && s.date <= we).reduce((a, s) => a + s.minutes, 0);
    return { week: w, hours: min / 60 };
  });
  if (data.every(d => d.hours === 0)) { host.innerHTML = `<div class="empty">Sem sessões registradas ainda — as barras aparecem aqui conforme você estuda.</div>`; return; }

  const W = 720, H = 220, padL = 34, padB = 26, padT = 12, padR = 8;
  const maxY = Math.max(META_HORAS_SEMANA + 4, ...data.map(d => d.hours)) * 1.1;
  const bw = (W - padL - padR) / data.length;
  const y = v => H - padB - (v / maxY) * (H - padB - padT);
  let bars = "", labels = "", grid = "";
  const stepsY = 4;
  for (let i = 0; i <= stepsY; i++) {
    const v = (maxY / stepsY) * i, yy = y(v);
    grid += `<line x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}" stroke="var(--grid)" stroke-width="1"/>
             <text x="${padL - 6}" y="${yy + 4}" text-anchor="end" font-size="10" fill="var(--ink-muted)">${Math.round(v)}h</text>`;
  }
  const metaY = y(META_HORAS_SEMANA);
  data.forEach((d, i) => {
    const x = padL + i * bw + bw * 0.18, w = bw * 0.64;
    const h = Math.max(0, H - padB - y(d.hours));
    if (d.hours > 0)
      bars += `<path d="M${x},${H - padB} v${-Math.max(0, h - 4)} q0,-4 4,-4 h${w - 8} q4,0 4,4 v${Math.max(0, h - 4)} z"
        fill="var(--seq-450)" data-tip="Semana de ${fmtBR(d.week)}: ${d.hours.toFixed(1)}h líquidas" class="hoverable"/>`;
    labels += `<text x="${x + w / 2}" y="${H - padB + 15}" text-anchor="middle" font-size="10" fill="var(--ink-muted)">${fmtBR(d.week).slice(0, 5)}</text>`;
  });
  host.innerHTML = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Horas de estudo por semana">
    ${grid}
    <line x1="${padL}" y1="${metaY}" x2="${W - padR}" y2="${metaY}" stroke="var(--ink-muted)" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="${W - padR}" y="${metaY - 5}" text-anchor="end" font-size="10" fill="var(--ink-2)">meta ${META_HORAS_SEMANA}h</text>
    ${bars}
    <line x1="${padL}" y1="${H - padB}" x2="${W - padR}" y2="${H - padB}" stroke="var(--baseline)" stroke-width="1"/>
    ${labels}
  </svg>`;
  attachTips(host);
}

/* ---------- gráfico: simulados (linhas) ---------- */
function drawSimChart() {
  const host = document.getElementById("chart-sim");
  if (!host) return;
  const sims = state.simulados;
  if (sims.length === 0) { host.innerHTML = `<div class="empty">Nenhum simulado ainda. O diagnóstico (prova BB 2021) inaugura este gráfico.</div>`; return; }

  const W = 720, H = 240, padL = 36, padB = 26, padT = 14, padR = 46;
  const x = i => sims.length === 1 ? (padL + (W - padL - padR) / 2) : padL + (i / (sims.length - 1)) * (W - padL - padR);
  const y = v => H - padB - (v / 100) * (H - padB - padT);
  let grid = "";
  for (let v = 0; v <= 100; v += 25)
    grid += `<line x1="${padL}" y1="${y(v)}" x2="${W - padR}" y2="${y(v)}" stroke="var(--grid)" stroke-width="1"/>
             <text x="${padL - 6}" y="${y(v) + 4}" text-anchor="end" font-size="10" fill="var(--ink-muted)">${v}%</text>`;
  const corte = `<line x1="${padL}" y1="${y(50)}" x2="${W - padR}" y2="${y(50)}" stroke="var(--critical)" stroke-width="1" stroke-dasharray="3 4" opacity="0.6"/>
    <text x="${W - padR}" y="${y(50) - 4}" text-anchor="end" font-size="9" fill="var(--critical)" opacity="0.8">corte 50%</text>`;

  const series = [
    { key: "total", name: "Total", color: "var(--series-1)" },
    { key: "basicos", name: "Básicos", color: "var(--series-2)" },
    { key: "especificos", name: "Específicos", color: "var(--series-3)" },
  ];
  let lines = "", dots = "", endLabels = "", xlabels = "";
  for (const s of series) {
    const pts = sims.map((sim, i) => `${x(i)},${y(sim[s.key])}`).join(" ");
    if (sims.length > 1) lines += `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round"/>`;
    sims.forEach((sim, i) => {
      dots += `<circle cx="${x(i)}" cy="${y(sim[s.key])}" r="4" fill="${s.color}" stroke="var(--surface-1)" stroke-width="2"
        class="hoverable" data-tip="${esc(sim.name)} (${fmtBR(sim.date)}) — ${s.name}: ${sim[s.key]}%"/>`;
    });
    const last = sims[sims.length - 1];
    endLabels += `<text x="${x(sims.length - 1) + 8}" y="${y(last[s.key]) + 4}" font-size="10" font-weight="600" fill="${s.color}">${last[s.key]}%</text>`;
  }
  sims.forEach((sim, i) => {
    xlabels += `<text x="${x(i)}" y="${H - padB + 15}" text-anchor="middle" font-size="10" fill="var(--ink-muted)">${fmtBR(sim.date).slice(0, 5)}</text>`;
  });
  host.innerHTML = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Evolução nos simulados">
    ${grid}${corte}${lines}${dots}${endLabels}
    <line x1="${padL}" y1="${H - padB}" x2="${W - padR}" y2="${H - padB}" stroke="var(--baseline)" stroke-width="1"/>
    ${xlabels}
  </svg>`;
  attachTips(host);
}

function renderSimTable() {
  const el = document.getElementById("sim-table");
  if (!el || state.simulados.length === 0) { if (el) el.innerHTML = ""; return; }
  el.innerHTML = `<div class="table-scroll" style="margin-top:10px"><table class="data">
    <tr><th>Data</th><th>Prova</th><th>Básicos</th><th>Específicos</th><th>Total</th><th>Redação</th><th></th></tr>
    ${state.simulados.map(s => `<tr><td>${fmtBR(s.date)}</td><td>${esc(s.name)}</td>
