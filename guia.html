/* ---------- gráfico: acerto por disciplina (barras horizontais) ---------- */
function drawAccChart() {
  const host = document.getElementById("chart-acc");
  if (!host) return;
  const acc = accuracyByDisc();
  const rows = Object.entries(acc).filter(([, v]) => v.q > 0)
    .map(([disc, v]) => ({ disc, pct: Math.round((v.c / v.q) * 100), q: v.q, c: v.c }))
    .sort((a, b) => a.pct - b.pct);
  if (rows.length === 0) { host.innerHTML = `<div class="empty">Registre sessões com nº de questões e acertos para ver este gráfico.</div>`; return; }

  const W = 720, rowH = 34, padL = 170, padR = 60, H = rows.length * rowH + 26;
  const x = v => padL + (v / 100) * (W - padL - padR);
  let bars = "";
  rows.forEach((r, i) => {
    const yy = 10 + i * rowH, bh = 16;
    const w = Math.max(2, x(r.pct) - padL);
    bars += `
      <text x="${padL - 8}" y="${yy + bh - 3}" text-anchor="end" font-size="11" fill="var(--ink-2)">${esc(r.disc)}</text>
      <rect x="${padL}" y="${yy}" width="${W - padL - padR - 2}" height="${bh}" rx="4" fill="var(--grid)" opacity="0.5"/>
      <path d="M${padL},${yy} h${Math.max(0, w - 4)} q4,0 4,4 v${bh - 8} q0,4 -4,4 h${-Math.max(0, w - 4)} z"
        fill="var(--seq-450)" class="hoverable" data-tip="${esc(r.disc)}: ${r.pct}% (${r.c}/${r.q} questões)"/>
      <text x="${x(r.pct) + 8}" y="${yy + bh - 3}" font-size="11" font-weight="600" fill="var(--ink-1)">${r.pct}%</text>`;
  });
  const g60 = `<line x1="${x(60)}" y1="6" x2="${x(60)}" y2="${H - 20}" stroke="var(--ink-muted)" stroke-width="1" stroke-dasharray="3 4"/>
    <text x="${x(60)}" y="${H - 6}" text-anchor="middle" font-size="9" fill="var(--ink-muted)">60%</text>`;
  const g80 = `<line x1="${x(80)}" y1="6" x2="${x(80)}" y2="${H - 20}" stroke="var(--ink-muted)" stroke-width="1" stroke-dasharray="3 4"/>
    <text x="${x(80)}" y="${H - 6}" text-anchor="middle" font-size="9" fill="var(--ink-muted)">80%</text>`;
  host.innerHTML = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Percentual de acerto por disciplina">${g60}${g80}${bars}</svg>`;
  attachTips(host);
}

/* ---------- tooltips ---------- */
function attachTips(host) {
  const tip = document.getElementById("viz-tooltip");
  host.querySelectorAll(".hoverable").forEach(elm => {
    elm.addEventListener("mousemove", e => {
      tip.textContent = elm.getAttribute("data-tip");
      tip.style.display = "block";
      const pad = 14;
      let lx = e.clientX + pad, ly = e.clientY + pad;
      const r = tip.getBoundingClientRect();
      if (lx + r.width > window.innerWidth - 8) lx = e.clientX - r.width - pad;
      if (ly + r.height > window.innerHeight - 8) ly = e.clientY - r.height - pad;
      tip.style.left = lx + "px"; tip.style.top = ly + "px";
    });
    elm.addEventListener("mouseleave", () => (tip.style.display = "none"));
  });
}

/* ============================================================
   BACKUP
============================================================ */
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `bb-estudos-backup-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast("⬇️ Backup exportado! Guarde na pasta do projeto.");
}
function importData(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.version) throw new Error("formato inválido");
      state = Object.assign(defaultState(), data);
      save(); renderAll();
      toast("⬆️ Backup importado com sucesso!");
    } catch (e) { toast("❌ Arquivo inválido — não é um backup deste app."); }
  };
  reader.readAsText(file);
  ev.target.value = "";
}
function resetAll() {
  if (!confirm("Apagar TODOS os dados de estudo deste navegador? Exporte um backup antes se tiver dúvida.")) return;
  state = defaultState();
  save(); renderAll();
  toast("Dados apagados. Recomeçando do zero.");
}

/* ============================================================
   QUIZ
============================================================ */
let quizS = null; // sessão de quiz em memória

function quizDiscs() {
  return ["Todas (mix)", ...new Set(QUESTOES.map(q => q.disc))];
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function buildQuizPool(disc, n) {
  let pool = QUESTOES.filter(q => disc === "Todas (mix)" || q.disc === disc);
  const st = state.quizStats;
  const unseen = pool.filter(q => !st[q.id]);
  const wrongBefore = pool.filter(q => st[q.id] && st[q.id].lastWrong);
  const rest = pool.filter(q => st[q.id] && !st[q.id].lastWrong);
  return [...shuffle(unseen), ...shuffle(wrongBefore), ...shuffle(rest)].slice(0, n);
}
function startQuiz() {
  const disc = document.getElementById("quiz-disc").value;
  const n = +document.getElementById("quiz-n").value;
  const mode = document.getElementById("quiz-mode").value;
  const qs = buildQuizPool(disc, n);
  if (!qs.length) { toast("Nenhuma questão disponível para esse filtro."); return; }
  quizS = { qs, idx: 0, picked: null, answers: [], started: Date.now(), mode };
  renderQuizTab();
}
function answerQuiz(i) {
  if (!quizS || quizS.picked !== null) return;
  const q = quizS.qs[quizS.idx];
  const ok = i === q.a;
  quizS.answers.push({ qid: q.id, disc: q.disc, ok, picked: i });
  const st = state.quizStats[q.id] || (state.quizStats[q.id] = { seen: 0, right: 0, lastWrong: false });
  st.seen++; if (ok) st.right++;
  st.lastWrong = !ok;
  if (!ok) registerQuizError(q);
  save();
  if (quizS.mode === "simulado") {
    // modo prova: sem feedback, avança direto
    if (quizS.idx + 1 >= quizS.qs.length) finishQuiz();
    else { quizS.idx++; renderQuizTab(); }
    return;
  }
  quizS.picked = i;
  renderQuizTab();
}
function registerQuizError(q) {
  const topic = `${q.top} (quiz)`;
  state.errors.push({ id: uid(), date: todayStr(), disc: q.disc, topic,
    cause: "CONCEITO (não sabia)", rule: q.exp, trap: q.trap || "" });
  const jaAgendada = state.reviews.some(r => r.label === topic && r.steps.some(s => !s.done));
  if (!jaAgendada) createReview(topic, q.disc, "erro", q.trap || q.exp.slice(0, 120));
}
function nextQuiz() {
  if (!quizS) return;
  if (quizS.idx + 1 >= quizS.qs.length) { finishQuiz(); return; }
  quizS.idx++; quizS.picked = null;
  renderQuizTab();
}
function finishQuiz() {
  const elapsedMin = Math.max(1, Math.round((Date.now() - quizS.started) / 60000));
  const byDisc = {};
  for (const a of quizS.answers) {
    byDisc[a.disc] = byDisc[a.disc] || { q: 0, c: 0 };
    byDisc[a.disc].q++; if (a.ok) byDisc[a.disc].c++;
  }
  const total = quizS.answers.length;
  for (const [disc, v] of Object.entries(byDisc)) {
    state.sessions.push({ id: uid(), date: todayStr(), disc,
      minutes: Math.max(1, Math.round(elapsedMin * v.q / total)), questions: v.q, correct: v.c });
  }
  save();
  quizS.finished = { byDisc, elapsedMin };
  renderQuizTab();
}
function quitQuiz() { quizS = null; renderQuizTab(); }

function renderQuizTab() {
  const el = document.getElementById("tab-quiz");
  if (!el) return;

  if (!quizS) {
    const stats = state.quizStats;
    const seen = Object.keys(stats).length;
    const right = Object.values(stats).reduce((a, s) => a + s.right, 0);
    const attempts = Object.values(stats).reduce((a, s) => a + s.seen, 0);
    el.innerHTML = `
    <div class="card">
      <h2>🧪 Quiz — questões estilo banca</h2>
      <p class="small">${QUESTOES.length} questões autorais no estilo Cesgranrio/FGV/Cebraspe, com explicação e pegadinha.
      <strong>Errou? O erro entra sozinho no caderno e vira revisão espaçada.</strong> O tempo e os acertos também são registrados como sessão.</p>
      <p class="muted"><strong>🎓 Treino</strong>: correção a cada questão, com explicação na hora. ·
      <strong>🏁 Simulado</strong>: sem feedback durante — correção completa só no final, como na prova real.</p>
      <form onsubmit="event.preventDefault(); startQuiz()">
        <div class="row">
          <div class="field"><label>Modo</label>
            <select id="quiz-mode"><option value="treino">🎓 Treino</option><option value="simulado">🏁 Simulado</option></select></div>
          <div class="field"><label>Disciplina</label>
            <select id="quiz-disc">${quizDiscs().map(d => `<option>${d}</option>`).join("")}</select></div>
          <div class="field"><label>Questões</label>
            <select id="quiz-n"><option>5</option><option selected>10</option><option>15</option><option>20</option><option>30</option><option>40</option></select></div>
        </div>
        <button class="btn">▶ Começar</button>
      </form>
      <p class="muted" style="margin-top:8px">Ritmo de prova: ~2 min/questão. Num simulado de 20, tente fechar em 40 min.</p>
      ${seen ? `<div class="muted" style="margin-top:8px">Seu histórico: ${seen}/${QUESTOES.length} questões já vistas · ${attempts ? Math.round((right / attempts) * 100) : 0}% de acerto em ${attempts} respostas.</div>` : ""}
    </div>`;
    return;
  }

  if (quizS.finished) {
    const { byDisc, elapsedMin } = quizS.finished;
    const total = quizS.answers.length, certas = quizS.answers.filter(a => a.ok).length;
    const pct = Math.round((certas / total) * 100);
    const tempoQ = (elapsedMin / total).toFixed(1);
    const nivel = pct >= 80 ? ["good", "🏆", "Excelente — nível de aprovação!"] : pct >= 60 ? ["warning", "💪", "Bom caminho — revise os erros registrados."] : ["serious", "📚", "Abaixo do corte — os erros já viram revisões; volte à teoria dos tópicos."];
    const letters = ["A", "B", "C", "D", "E"];
    const gabarito = quizS.mode !== "simulado" ? "" : (() => {
      const wrongs = quizS.answers.filter(a => !a.ok);
      if (!wrongs.length) return `<h3>Gabarito comentado</h3><div class="empty">Nenhum erro — simulado gabaritado! 🎯</div>`;
      return `<h3>Gabarito comentado — suas ${wrongs.length} erradas</h3>` + wrongs.map(a => {
        const q = QUESTOES.find(x => x.id === a.qid);
        return `<details class="disc"><summary><span class="badge kind">${esc(q.disc)} · ${esc(q.top)}</span>
          <span style="flex:1">${esc(q.q.length > 90 ? q.q.slice(0, 90) + "…" : q.q)}</span></summary>
          <div class="topic-row" style="display:block">
            <div class="small">Você marcou <strong style="color:var(--critical)">${letters[a.picked]}</strong>; a correta é
            <strong style="color:var(--good)">${letters[q.a]}) ${esc(q.o[q.a])}</strong></div>
            <div class="small" style="margin-top:6px">${esc(q.exp)}</div>
            ${q.trap ? `<div class="small" style="margin-top:6px">🪤 ${esc(q.trap)}</div>` : ""}
          </div></details>`;
      }).join("");
    })();
    el.innerHTML = `
    <div class="card">
      <h2>${quizS.mode === "simulado" ? "🏁 Resultado do simulado" : "Resultado do quiz"}</h2>
      <div class="coach-msg ${nivel[0]}"><span class="ico">${nivel[1]}</span>
        <span><strong>${certas}/${total} (${pct}%)</strong> em ${elapsedMin} min (${tempoQ} min/questão — alvo: ≤2). ${nivel[2]}</span></div>
      <div class="table-scroll"><table class="data"><tr><th>Disciplina</th><th>Acertos</th><th>%</th></tr>
        ${Object.entries(byDisc).map(([d, v]) => `<tr><td>${esc(d)}</td><td>${v.c}/${v.q}</td><td>${Math.round((v.c / v.q) * 100)}%</td></tr>`).join("")}
      </table></div>
      ${gabarito}
      <p class="muted" style="margin-top:8px">✓ Sessão registrada automaticamente. ${total - certas ? `✓ ${total - certas} erro(s) adicionados ao caderno e agendados para revisão (+1/+7/+30).` : "Nenhum erro — nada novo para revisar."}</p>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn" onclick="quitQuiz()">Novo quiz</button>
        <button class="btn ghost" onclick="quizS=null; document.querySelector('[data-tab=hoje]').click()">Ver revisões de hoje</button>
      </div>
    </div>`;
    return;
  }

  const q = quizS.qs[quizS.idx];
  const picked = quizS.picked;
  const letters = ["A", "B", "C", "D", "E"];
  const opts = q.o.map((o, i) => {
    let cls = "";
    if (picked !== null) {
      if (i === q.a) cls = "is-correct";
      else if (i === picked) cls = "is-wrong";
    }
    return `<button class="quiz-opt ${cls}" ${picked !== null ? "disabled" : ""} onclick="answerQuiz(${i})">
      <span class="letter">${letters[i]})</span><span>${esc(o)}</span></button>`;
  }).join("");
  const fb = picked === null ? "" : `
    <div class="quiz-fb ${picked === q.a ? "ok" : "nok"}">
      <strong>${picked === q.a ? "✅ Correta!" : `❌ Errada — a resposta é ${letters[q.a]}.`}</strong><br>
      ${esc(q.exp)}
      ${q.trap ? `<br><br>🪤 <strong>Pegadinha:</strong> ${esc(q.trap)}` : ""}
      ${picked !== q.a ? `<br><span class="muted">✓ Registrado no caderno de erros e agendado para revisão.</span>` : ""}
    </div>
    <button class="btn" onclick="nextQuiz()">${quizS.idx + 1 >= quizS.qs.length ? "Ver resultado →" : "Próxima →"}</button>`;
  const elapsed = Math.floor((Date.now() - quizS.started) / 60000);
  el.innerHTML = `
  <div class="card">
    <div class="quiz-meta">
      <span class="badge">${quizS.mode === "simulado" ? "🏁" : "🎓"} ${quizS.idx + 1}/${quizS.qs.length}</span>
      ${quizS.mode === "simulado" ? `<span class="badge kind">⏱ ${elapsed} min</span>` : `<span class="badge kind">${esc(q.disc)} · ${esc(q.top)}</span>`}
      <span class="spacer" style="flex:1"></span>
      <button class="btn sm ghost" onclick="quitQuiz()">✕ Sair</button>
    </div>
    <div class="progress-outer"><div style="width:${Math.round((quizS.idx / quizS.qs.length) * 100)}%"></div></div>
    <div class="quiz-q">${esc(q.q)}</div>
    ${opts}
    ${fb}
  </div>`;
}

/* ============================================================
   FLASHCARDS (repetição espaçada própria)
============================================================ */
let cardQ = null; // fila da sessão em memória

function allCards() {
  const fromErrors = state.errors.map(e => ({
    id: "err_" + e.id, disc: e.disc,
    front: `❌ ${e.topic}\n(${e.cause.split(" ")[0]})`,
    back: e.rule + (e.trap ? `\n\n🪤 ${e.trap}` : ""),
  }));
  return [...CARDS, ...fromErrors];
}
function dueCardsToday() {
  const t = todayStr();
  return allCards().filter(c => {
    const s = state.cardsSrs[c.id];
    return !s || s.due <= t;
  });
}
function startCards() {
  const due = dueCardsToday();
  if (!due.length) { renderCardsTab(); return; }
  cardQ = { list: shuffle(due), idx: 0, flipped: false, done: 0, total: due.length };
  renderCardsTab();
}
function flipCard() { if (cardQ) { cardQ.flipped = !cardQ.flipped; renderCardsTab(); } }
function gradeCard(ok) {
  const c = cardQ.list[cardQ.idx];
  const s = state.cardsSrs[c.id] || { step: -1, due: todayStr() };
  if (ok) {
    s.step = Math.min(s.step + 1, SRS_LADDER.length - 1);
    s.due = addDays(todayStr(), SRS_LADDER[s.step]);
    cardQ.done++;
  } else {
    s.step = 0;
    s.due = addDays(todayStr(), 1);
    cardQ.list.push(c); // reaparece ainda nesta sessão
    cardQ.total++;
    cardQ.done++;
  }
  state.cardsSrs[c.id] = s;
  save();
  cardQ.idx++; cardQ.flipped = false;
  if (cardQ.idx >= cardQ.list.length) cardQ.finished = true;
  renderCardsTab();
}
function renderCardsTab() {
  const el = document.getElementById("tab-cartoes");
  if (!el) return;
  const due = dueCardsToday();
  const total = allCards().length;

  if (!cardQ || cardQ.finished) {
    const fin = cardQ && cardQ.finished;
    cardQ = null;
    el.innerHTML = `
    <div class="card">
      <h2>📇 Cartões — memorização espaçada</h2>
      <p class="small">${CARDS.length} cartões essenciais (portas, chmod, ACID, CMN×Bacen×CVM...) + <strong>cada erro do seu caderno vira um cartão automaticamente</strong>.
      Acertou: o cartão volta em intervalos crescentes (1→3→7→15→30→60 dias). Errou: volta amanhã e reaparece nesta sessão.</p>
      ${fin ? `<div class="coach-msg good"><span class="ico">🎉</span><span>Sessão concluída! Todos os cartões do dia revisados.</span></div>` : ""}
      ${due.length
        ? `<div class="coach-msg warning"><span class="ico">📇</span><span><strong>${due.length}</strong> cartão(ões) para revisar hoje (de ${total} no total).</span></div>
           <button class="btn" onclick="startCards()">▶ Revisar agora</button>`
        : `<div class="coach-msg good"><span class="ico">✅</span><span>Nenhum cartão vencido hoje. Total no baralho: ${total}.</span></div>`}
      <h3 style="margin-top:18px">📱 Levar para o celular (Anki)</h3>
      <p class="muted">Exporta todos os ${total} cartões (incluindo os gerados pelos seus erros) em arquivo de texto para importar
      no AnkiDroid/AnkiMobile: Anki → Importar → separado por TAB → 1º campo = frente, 2º = verso.</p>
      <button class="btn ghost" onclick="exportAnki()">⬇️ Exportar para Anki (.txt)</button>
    </div>`;
    return;
  }

  const c = cardQ.list[cardQ.idx];
  el.innerHTML = `
  <div class="card">
    <div class="quiz-meta">
      <span class="badge">${cardQ.done + 1}/${cardQ.total}</span>
      <span class="badge kind">${esc(c.disc)}</span>
      <span class="spacer" style="flex:1"></span>
      <button class="btn sm ghost" onclick="cardQ=null; renderCardsTab()">✕ Sair</button>
    </div>
    <div class="progress-outer"><div style="width:${Math.round((cardQ.done / cardQ.total) * 100)}%"></div></div>
    <div class="fcard" onclick="flipCard()">
      ${cardQ.flipped
        ? `<div class="side-label">Resposta</div><div class="back-text">${esc(c.back)}</div>`
        : `<div class="side-label">Pergunta — clique para virar</div><div style="white-space:pre-line">${esc(c.front)}</div>`}
    </div>
    <div class="fcard-controls">
      ${cardQ.flipped
        ? `<button class="btn danger" onclick="gradeCard(false)">❌ Esqueci</button>
           <button class="btn good" onclick="gradeCard(true)">✅ Lembrei</button>`
        : `<button class="btn ghost" onclick="flipCard()">Virar cartão</button>`}
    </div>
  </div>`;
}

function exportAnki() {
  const clean = s => String(s).replace(/\t/g, " ").replace(/\n/g, "<br>");
  const lines = ["#separator:tab", "#html:true",
    ...allCards().map(c => `${clean(c.front)}\t${clean(c.back)}\tBB::${clean(c.disc)}`)];
  const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `bb-flashcards-anki-${todayStr()}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast("⬇️ Exportado! No Anki: Importar → separador TAB (3º campo é a tag).");
}

/* ============================================================
   MATERIAIS (plano completo)
============================================================ */
function planoStats(ciclo) {
  let done = 0, total = 0;
  for (const sem of ciclo.semanas)
    for (const t of sem.tarefas) { total++; if (state.plano[t.id]) done++; }
  return { done, total };
}
function currentWeekId() {
  for (const c of PLANO_MATERIAIS)
    for (const sem of c.semanas)
      if (sem.tarefas.some(t => !state.plano[t.id])) return sem.id;
  return null;
}
function toggleTarefa(id) {
  if (state.plano[id]) delete state.plano[id]; else state.plano[id] = true;
  save();
  const open = [...document.querySelectorAll("#tab-materiais details.disc")].map(d => d.open);
  renderMateriais();
  [...document.querySelectorAll("#tab-materiais details.disc")].forEach((d, i) => (d.open = open[i]));
}
function renderMateriais() {
  const el = document.getElementById("tab-materiais");
  if (!el) return;
  const aqui = currentWeekId();
  let totalDone = 0, totalAll = 0;

  const blocos = PLANO_MATERIAIS.map(ciclo => {
    const st = planoStats(ciclo);
    totalDone += st.done; totalAll += st.total;
    const semanas = ciclo.semanas.map(sem => {
      const semDone = sem.tarefas.filter(t => state.plano[t.id]).length;
      const isAqui = sem.id === aqui;
      const rows = sem.tarefas.map(t => `
        <div class="topic-row">
          <input type="checkbox" style="width:17px;height:17px;accent-color:var(--accent);cursor:pointer;flex-shrink:0"
            ${state.plano[t.id] ? "checked" : ""} onchange="toggleTarefa('${t.id}')">
          <div class="tname" style="${state.plano[t.id] ? "opacity:.55;text-decoration:line-through" : ""}">${esc(t.txt)}</div>
          ${t.link ? `<a href="${LINKS[t.link]}" target="_blank" rel="noopener" class="badge" style="text-decoration:none">abrir ↗</a>` : ""}
        </div>`).join("");
      return `<details class="disc" ${isAqui ? "open" : ""}>
        <summary>
          <span>${esc(sem.titulo)}</span>
          ${isAqui ? `<span class="badge">📍 você está aqui</span>` : ""}
          <span class="spacer" style="flex:1"></span>
          <span class="muted">${semDone}/${sem.tarefas.length}</span>
        </summary>
        <div class="topic-row" style="border-top:none"><div class="tname muted">🎯 ${esc(sem.objetivo)}</div></div>
        ${rows}
      </details>`;
    }).join("");
    return `<div class="card">
      <h2>${esc(ciclo.ciclo)} <span class="muted" style="font-weight:400">· ${st.done}/${st.total}</span></h2>
      <p class="muted">${esc(ciclo.desc)}</p>
      <div class="progress-outer"><div style="width:${st.total ? Math.round((st.done / st.total) * 100) : 0}%"></div></div>
      ${semanas}
    </div>`;
  }).join("");

  el.innerHTML = `
  <div class="card">
    <h2>📚 Materiais e roteiro completo</h2>
    <p class="small">O plano inteiro, da Semana 0 até a prova, com links diretos. <strong>Custo total da Fase 1: só a
    plataforma de questões</strong> — todo o resto é gratuito (fontes oficiais do Bacen, lei seca, YouTube e este guia).
    Não compre curso de TI; não acumule material.</p>
    <div class="small" style="margin-top:6px"><strong>${totalDone}</strong> de ${totalAll} tarefas concluídas</div>
    <div class="progress-outer"><div style="width:${Math.round((totalDone / totalAll) * 100)}%"></div></div>
    <p class="muted" style="margin-top:6px">As semanas dizem O QUE estudar; o horário (manhã/tarde/noite) segue o
    cronograma da aba 📅 Hoje. Terminou uma semana? A badge 📍 avança sozinha.</p>
  </div>
  ${blocos}`;
}

/* ============================================================
   TEMA / TABS / INIT
============================================================ */
function applyTheme() {
  const pref = localStorage.getItem("bb-theme");
  if (pref === "dark" || pref === "light") document.documentElement.setAttribute("data-theme", pref);
  else document.documentElement.removeAttribute("data-theme");
}
document.getElementById("theme-toggle").addEventListener("click", () => {
  const cur = localStorage.getItem("bb-theme");
  const next = cur === "dark" ? "light" : cur === "light" ? null : "dark";
  if (next) localStorage.setItem("bb-theme", next); else localStorage.removeItem("bb-theme");
  applyTheme();
  toast(`Tema: ${next || "automático (sistema)"}`);
  renderAll();
});

document.getElementById("tabs").addEventListener("click", e => {
  const btn = e.target.closest("button[data-tab]");
  if (!btn) return;
  document.querySelectorAll("nav.tabs button").forEach(b => b.classList.toggle("active", b === btn));
  document.querySelectorAll("main .tab").forEach(s => s.classList.toggle("active", s.id === "tab-" + btn.dataset.tab));
  renderTab(btn.dataset.tab);
});

function renderTab(name) {
  if (name === "hoje") renderHoje();
  else if (name === "metodo") renderMetodo();
  else if (name === "quiz") renderQuizTab();
  else if (name === "cartoes") renderCardsTab();
  else if (name === "materiais") renderMateriais();
  else if (name === "registrar") renderRegistrar();
  else if (name === "edital") renderEdital();
  else if (name === "progresso") renderProgresso();
}
function renderAll() {
  const active = document.querySelector("nav.tabs button.active")?.dataset.tab || "hoje";
  renderTab(active);
}

const hoje = new Date();
document.getElementById("header-date").textContent =
  hoje.toLocaleDateString("pt-BR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });

window.addEventListener("beforeunload", e => {
  if (timer.elapsed > 60000) { e.preventDefault(); e.returnValue = ""; }
});

applyTheme();
renderHoje();
</script>
